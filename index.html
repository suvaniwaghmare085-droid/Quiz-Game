<!DOCTYPE html>
<html>
<head>
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Quiz Game</h1>

  <p id="progress"></p>

  <div id="quiz">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button id="nextBtn" class="hidden">Next</button>
  </div>

  <div id="result" class="hidden">
    <h2 id="score"></h2>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
