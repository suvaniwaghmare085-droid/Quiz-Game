<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="logo">Elite Quiz Game</div>

      <!-- Category Selection -->
      <div id="category-screen" class="screen">
        <h2>Select a Category</h2>
        <div id="category-options"></div>
      </div>

      <!-- Quiz -->
      <div id="quiz-screen" class="screen hidden">
        <div class="top-row">
          <div id="timer">⏰ 15s</div>
          <div id="q-counter">Question 1</div>
          <div id="score-chip">Score: 0</div>
        </div>

        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>

        <h2 id="question"></h2>
        <div id="answers"></div>
        <div id="feedback"></div>
        <button id="nextBtn" class="hidden">Next →</button>
      </div>

      <!-- Result -->
      <div id="result-screen" class="screen hidden">
        <div id="confetti"></div>
        <h2 id="result-title"></h2>
        <p id="result-sub"></p>
        <div id="score-details">
          <span id="score-num">0</span>/<span id="score-total">0</span>
        </div>
        <div id="leaderboard">
          <h3>Leaderboard</h3>
          <ul id="leaderboard-list"></ul>
        </div>
        <button id="restartBtn">↺ Play Again</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
